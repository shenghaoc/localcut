# CircleCI configuration for browser-editor.
#
# Migrated from the four CI workflows previously under .github/workflows/:
#   - ci.yml                → quality_gate
#   - browser-tests.yml     → browser_tests
#   - otio-validation.yml   → otio_validation
#   - whip-integration.yml  → whip_integration
#
# Each design choice traces to one of the official docs the project follows:
#   - pnpm CI:        https://pnpm.io/continuous-integration
#   - Playwright CI:  https://playwright.dev/docs/ci
#   - CircleCI Docker executor:
#                     https://circleci.com/docs/guides/execution-managed/using-docker/
#   - CircleCI Python:
#                     https://circleci.com/docs/guides/getting-started/language-python/
#   - vite-plus CI:   https://viteplus.dev/guide/ci (no CircleCI support —
#                     `vp` is invoked through `pnpm exec` since vite-plus is
#                     a project devDependency, so the binary is on
#                     node_modules/.bin/ after `pnpm install`).
#
# claude.yml stays on GitHub Actions: it triggers on GitHub-native events
# (issue_comment, pull_request_review_comment, …) that CircleCI cannot
# receive without an external webhook relay. The deny-list in that workflow
# keeps Claude out of `.github/workflows/*`; `.circleci/*` is intentionally
# not denied so Claude can iterate on this config from review comments.
#
# Auto-cancel-redundant-builds (the equivalent of the GH workflows'
# `concurrency.cancel-in-progress: true`) is a per-project CircleCI setting:
# Project Settings → Advanced → Auto-cancel redundant workflows. Enable it
# there; it can't be expressed in this file.

version: 2.1

# --------------------------------- executors --------------------------------

executors:
  # quality_gate uses node:26-bookworm because tsgo (@typescript/native-
  # preview) and the project's catalog versions are validated against the
  # exact major in .node-version. cimg/node:current tracks the LTS line and
  # would silently downgrade. Per CircleCI's Docker-executor guide, any
  # public image works as an executor.
  node:
    docker:
      - image: node:26-bookworm
    resource_class: large
    working_directory: /root/project
    environment:
      PNPM_STORE_PATH: /root/.pnpm-store

  # browser_tests uses Playwright's official prebuilt image, per
  # https://playwright.dev/docs/ci — it ships with the browser binaries AND
  # all browser system dependencies preinstalled at /ms-playwright (Vitest's
  # browser provider auto-discovers them). The image tag pins to our
  # @playwright/test devDep version (1.60.0) so the bundled browsers match
  # the JS package on disk. This is what skips the `playwright install
  # --with-deps chromium` step entirely — the same step that was hanging on
  # GitHub's Azure runners.
  playwright:
    docker:
      - image: mcr.microsoft.com/playwright:v1.60.0-noble
    resource_class: large
    working_directory: /root/project
    environment:
      PNPM_STORE_PATH: /root/.pnpm-store

  # otio_validation: standard CircleCI Python convenience image, per
  # https://circleci.com/docs/guides/getting-started/language-python/.
  python:
    docker:
      - image: cimg/python:3.12
    resource_class: small
    working_directory: ~/project

  # whip_integration: machine executor is mandatory — MediaMTX
  # (`docker run --network host`) and Playwright's Chromium must share a
  # network namespace so WebRTC ICE host candidates resolve. The docker
  # executor + setup_remote_docker isolates the daemon on a separate VM and
  # breaks that. docker_layer_caching warms the MediaMTX pull between runs.
  linux_machine:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: true
    resource_class: large
    working_directory: ~/project

# ---------------------------------- commands --------------------------------

commands:
  install_pnpm_deps:
    description: "Install pnpm at the locked packageManager version + pnpm install --frozen-lockfile"
    steps:
      - run:
          name: Install pnpm (version from package.json packageManager)
          # https://pnpm.io/continuous-integration#circleci recommends
          # corepack, but corepack is no longer reliably bundled in recent
          # Node majors (the first CircleCI run on this branch hit exit 127
          # on `corepack enable` inside node:26-bookworm). Resolving the
          # version out of `packageManager` and `npm install -g`'ing it
          # gives the same version-pinned install with no corepack
          # dependency.
          command: |
            PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
            echo "Installing pnpm@${PNPM_VERSION}"
            npm install -g "pnpm@${PNPM_VERSION}"
            pnpm --version
            pnpm config set store-dir "${PNPM_STORE_PATH:-$HOME/.pnpm-store}"
      - restore_cache:
          # pnpm's CI guide caches the content-addressable store keyed on
          # the lockfile — install collapses to symlink creation on hit.
          name: Restore pnpm content store
          keys:
            - pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-{{ arch }}-
      - run:
          name: pnpm install --frozen-lockfile
          # `prepare` in package.json runs `vp config` after install
          # completes; vite-plus is a devDependency so its bin is already
          # on node_modules/.bin by then.
          command: pnpm install --frozen-lockfile
      - save_cache:
          name: Save pnpm content store
          paths:
            - /root/.pnpm-store
            - ~/.pnpm-store
          key: pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}

# ----------------------------------- jobs -----------------------------------

jobs:
  # Mirrors ci.yml. `vp run check` chains format:check + lint + typecheck
  # (tsgo) + Vitest + production build; each is declared as a cached task in
  # vite.config.ts, so the task cache replays content-unchanged steps.
  quality_gate:
    executor: node
    steps:
      - checkout
      - install_pnpm_deps
      - restore_cache:
          name: Restore Vite+ task cache
          keys:
            - vp-task-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}-{{ .Revision }}
            - vp-task-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}-
            - vp-task-v1-{{ arch }}-
      - run:
          name: vp run check
          # check:build lists LOCALCUT_BUILD_SHA as a cache input (the SHA
          # is baked into the bundle via `define` in vite.config.ts) —
          # surface CircleCI's commit SHA under that name so a new commit
          # forces a rebuild instead of replaying a stale bundle.
          command: |
            export LOCALCUT_BUILD_SHA="${CIRCLE_SHA1}"
            pnpm exec vp run check
      - save_cache:
          name: Save Vite+ task cache
          paths:
            - node_modules/.vite/task-cache
          key: vp-task-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}-{{ .Revision }}

  # Mirrors browser-tests.yml. Real-Chromium Vitest browser mode. With the
  # Playwright image as base, there is no separate `playwright install`
  # step — the browsers are already at /ms-playwright inside the image
  # (PLAYWRIGHT_BROWSERS_PATH is set by the image), so Vitest's browser
  # provider finds them on first use.
  browser_tests:
    executor: playwright
    steps:
      - checkout
      - install_pnpm_deps
      - run:
          name: vp run test:browser
          command: pnpm exec vp run test:browser

  # Mirrors otio-validation.yml. CI-only Python validation of the golden
  # .otio fixtures with the reference opentimelineio package; the app
  # itself never ships or requires Python.
  otio_validation:
    executor: python
    steps:
      - checkout
      - restore_cache:
          name: Restore pip wheel cache
          # Per the CircleCI Python guide, key on the requirements file
          # checksum so a bump deliberately invalidates the cache.
          keys:
            - pip-otio-v1-{{ checksum "scripts/requirements-otio.txt" }}
            - pip-otio-v1-
      - run:
          name: pip install -r scripts/requirements-otio.txt
          command: pip install --user -r scripts/requirements-otio.txt
      - save_cache:
          name: Save pip wheel cache
          paths:
            - ~/.cache/pip
          key: pip-otio-v1-{{ checksum "scripts/requirements-otio.txt" }}
      - run:
          name: Validate OTIO fixtures
          command: python scripts/validate-otio-fixtures.py

  # Mirrors whip-integration.yml. Cannot use the Playwright Docker image
  # here — the host-network MediaMTX + Chromium requirement forces machine
  # executor, so the Playwright browsers must be installed via the
  # `playwright install` path documented at
  # https://playwright.dev/docs/ci. Browsers are cached by their resolved
  # version, so warm runs skip the download.
  whip_integration:
    executor: linux_machine
    steps:
      - checkout
      - run:
          name: Install Node (.node-version) from nodejs.org
          # ubuntu-2404:current doesn't reliably ship nvm. Resolve the
          # latest patch of .node-version's major from
          # https://nodejs.org/dist/index.tab and unpack the linux-x64
          # tarball into /usr/local — version-precise, image-agnostic,
          # /usr/local/bin is already on PATH so no BASH_ENV plumbing.
          command: |
            NODE_MAJOR="$(cat .node-version)"
            NODE_VERSION=$(curl -fsSL https://nodejs.org/dist/index.tab \
              | awk -v p="v${NODE_MAJOR}." 'NR>1 && $1 ~ "^"p {print $1; exit}')
            if [ -z "$NODE_VERSION" ]; then
              echo "No Node ${NODE_MAJOR}.x release found on nodejs.org" >&2
              exit 1
            fi
            echo "Installing Node ${NODE_VERSION}"
            curl -fsSL "https://nodejs.org/dist/${NODE_VERSION}/node-${NODE_VERSION}-linux-x64.tar.xz" \
              -o /tmp/node.tar.xz
            sudo tar -xJf /tmp/node.tar.xz -C /usr/local --strip-components=1
            node --version
            npm --version
      - install_pnpm_deps
      - run:
          name: Resolve Playwright version
          # Used by the cache keys below — Playwright's CI guide
          # recommends keying browser caches on the binary's version.
          command: |
            PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | awk '{print $2}')
            echo "Playwright version: ${PLAYWRIGHT_VERSION}"
            echo "export PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION}" >> "$BASH_ENV"
      - restore_cache:
          name: Restore Playwright browsers
          keys:
            - playwright-v1-{{ arch }}-${PLAYWRIGHT_VERSION}
      - run:
          name: Install Playwright Chromium (with system deps)
          # --with-deps apt-installs browser sandbox libs the first time;
          # cached browsers skip the download itself on warm runs.
          command: pnpm exec playwright install --with-deps chromium
      - save_cache:
          name: Save Playwright browsers
          paths:
            - ~/.cache/ms-playwright
          key: playwright-v1-{{ arch }}-${PLAYWRIGHT_VERSION}
      - run:
          name: Start MediaMTX (host network, API enabled)
          # MTX_API exposes the read-only API the test polls. The
          # reconnect test inside the spec restarts this container by
          # name, hence MEDIAMTX_CONTAINER below.
          command: |
            docker run -d --name whip-mediamtx --network host \
              -e MTX_API=yes \
              bluenviron/mediamtx:latest
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:9997/v3/paths/list > /dev/null; then
                exit 0
              fi
              sleep 1
            done
            echo 'MediaMTX API never became ready' >&2
            docker logs whip-mediamtx >&2
            exit 1
      - run:
          name: Run WHIP integration tests
          command: pnpm exec playwright test tests/e2e/whip-publish.spec.ts
          environment:
            MEDIAMTX_CONTAINER: whip-mediamtx
      - run:
          name: MediaMTX logs (on failure)
          command: docker logs whip-mediamtx || true
          when: on_fail
      - store_artifacts:
          path: test-results
          destination: playwright-traces

# --------------------------------- workflows --------------------------------

workflows:
  # Trigger surface mirrors the GH workflows: every push, every PR. The four
  # jobs run in parallel by default; gating them with branch filters would
  # re-introduce the long PR feedback loop the user is trying to escape.
  ci:
    jobs:
      - quality_gate
      - browser_tests
      - otio_validation
      # whip-integration.yml was filtered to `branches: [main]`. CircleCI
      # has no native PR-target awareness, so we run on every branch and
      # catch regressions before merge instead of after. Add a `filters:`
      # block here if WHIP run cost ever becomes a concern.
      - whip_integration
