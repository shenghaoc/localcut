# CircleCI configuration for browser-editor.
#
# Migrated 1:1 from the GitHub Actions workflows under .github/workflows/:
#   - ci.yml                → quality_gate
#   - browser-tests.yml     → browser_tests
#   - otio-validation.yml   → otio_validation
#   - whip-integration.yml  → whip_integration
#
# Why CircleCI: the GitHub-hosted runners (Azure) intermittently hang during
# `playwright install --with-deps`, which the browser_tests and whip
# workflows both rely on. CircleCI's machine images ship apt mirrors that
# don't share Azure's egress path, so the install completes deterministically.
#
# claude.yml stays on GitHub: it triggers on GitHub-native events
# (issue_comment, pull_request_review, etc.) that CircleCI cannot receive
# without an external webhook relay. The deny-list in that workflow keeps
# Claude out of `.github/workflows/*` — `.circleci/*` is intentionally not
# denied so Claude can iterate on this config from review comments.
#
# CircleCI-specific optimizations versus the original workflows:
#   * Reusable `executors` + `commands` deduplicate the pnpm/install setup
#     four jobs would otherwise repeat.
#   * pnpm content-addressable store is cached at ~/.pnpm-store, keyed on the
#     lockfile — install collapses to symlink creation on cache hit.
#   * Vite+ task cache (node_modules/.vite/task-cache) is keyed on lockfile +
#     commit SHA with restore-key fallback, so unchanged check:* steps replay
#     from cache between runs (same contract as ci.yml).
#   * Playwright browser cache is keyed on the resolved Playwright version
#     extracted from the installed binary.
#   * WHIP runs on `machine: ubuntu-2404` (not docker + setup_remote_docker)
#     because the WebRTC ICE host candidates from MediaMTX (--network host)
#     must be reachable from Playwright's Chromium on the same network
#     namespace — a remote-docker daemon on a separate VM would break that.
#   * docker_layer_caching on the machine executor speeds up the MediaMTX
#     image pull between runs.
#   * Auto-cancel-redundant-builds for in-progress workflows is a per-project
#     CircleCI setting (Project Settings → Advanced) — enable it to match the
#     `concurrency.cancel-in-progress: true` semantics from the GH workflows.

version: 2.1

# --------------------------------- executors --------------------------------

executors:
  # Pinned to .node-version (Node 26). The official `node:` image guarantees a
  # specific major; CircleCI's `cimg/node:current` tracks the LTS line and
  # would silently downgrade. node:26-bookworm includes git/curl/openssh so
  # `checkout`, `restore_cache`, and pnpm fetch work without extra setup.
  node:
    docker:
      - image: node:26-bookworm
    resource_class: large
    working_directory: /root/project
    environment:
      # Keep pnpm's store out of the working tree so workspace persist/restore
      # never touches it, and so the store cache key isolates dependency
      # changes from source changes.
      PNPM_HOME: /root/.pnpm
      PNPM_STORE_PATH: /root/.pnpm-store

  # OTIO validation is a CI-only Python step (Phase 48) — kept off the node
  # executor so the Python toolchain stays out of the main build matrix.
  python:
    docker:
      - image: cimg/python:3.12
    resource_class: small
    working_directory: ~/project

  # WHIP integration: WebRTC ICE host candidates from `--network host`
  # MediaMTX must be reachable from Playwright's Chromium. The docker
  # executor + setup_remote_docker isolates the daemon on a separate VM, so
  # we use a Linux machine VM instead and run Docker on the host network.
  linux_machine:
    machine:
      image: ubuntu-2404:current
      docker_layer_caching: true
    resource_class: large
    working_directory: ~/project

# ---------------------------------- commands --------------------------------

commands:
  install_pnpm_deps:
    description: "Install pnpm at the locked packageManager version + pnpm install --frozen-lockfile"
    steps:
      - run:
          name: Install pnpm (version from package.json packageManager)
          # Corepack used to be the obvious choice here, but it's no longer
          # bundled with the Node distribution in recent majors (the previous
          # CircleCI run hit exit 127 on `corepack enable`). Parsing the
          # `packageManager` field and installing via `npm -g` is the
          # version-pinned, corepack-free equivalent.
          command: |
            PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
            echo "Installing pnpm@${PNPM_VERSION}"
            npm install -g "pnpm@${PNPM_VERSION}"
            pnpm --version
            pnpm config set store-dir "${PNPM_STORE_PATH:-$HOME/.pnpm-store}"
      - restore_cache:
          name: Restore pnpm content store
          keys:
            - pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}
            - pnpm-v1-{{ arch }}-
      - run:
          name: pnpm install --frozen-lockfile
          # `prepare` in package.json runs `vp config` after install completes;
          # vite-plus is a devDependency so its bin is on node_modules/.bin by
          # then. Nothing extra to wire up.
          command: pnpm install --frozen-lockfile
      - save_cache:
          name: Save pnpm content store
          paths:
            - /root/.pnpm-store
            - ~/.pnpm-store
          key: pnpm-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}

# ----------------------------------- jobs -----------------------------------

jobs:
  # Mirrors .github/workflows/ci.yml. `vp run check` chains format:check,
  # lint, typecheck (tsgo), Vitest, and production build — each declared as a
  # cached task in vite.config.ts so the task cache replays unchanged steps.
  quality_gate:
    executor: node
    steps:
      - checkout
      - install_pnpm_deps
      - restore_cache:
          name: Restore Vite+ task cache
          keys:
            - vp-task-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}-{{ .Revision }}
            - vp-task-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}-
            - vp-task-v1-{{ arch }}-
      - run:
          name: vp run check
          # BUILD_SHA is baked into the bundle via `define` in vite.config.ts;
          # surface CircleCI's SHA1 under the env name the check:build task
          # already lists as a cache input.
          command: |
            export LOCALCUT_BUILD_SHA="${CIRCLE_SHA1}"
            pnpm exec vp run check
      - save_cache:
          name: Save Vite+ task cache
          paths:
            - node_modules/.vite/task-cache
          key: vp-task-v1-{{ arch }}-{{ checksum "pnpm-lock.yaml" }}-{{ .Revision }}

  # Mirrors .github/workflows/browser-tests.yml. Real-Chromium Vitest browser
  # mode; Playwright browsers cached by their resolved version.
  browser_tests:
    executor: node
    steps:
      - checkout
      - install_pnpm_deps
      - run:
          name: Resolve Playwright version
          # Exported into BASH_ENV so later steps (including the cache keys
          # below) can read $PLAYWRIGHT_VERSION via shell interpolation.
          command: |
            PLAYWRIGHT_VERSION=$(pnpm exec playwright --version | awk '{print $2}')
            echo "Playwright version: ${PLAYWRIGHT_VERSION}"
            echo "export PLAYWRIGHT_VERSION=${PLAYWRIGHT_VERSION}" >> "$BASH_ENV"
      - restore_cache:
          name: Restore Playwright browsers
          keys:
            - playwright-v1-{{ arch }}-${PLAYWRIGHT_VERSION}
      - run:
          name: Install Playwright Chromium (with system deps)
          # `--with-deps` apt-installs the browser sandbox libs the first
          # time; cached browsers skip the download itself on warm runs.
          command: pnpm exec playwright install --with-deps chromium
      - save_cache:
          name: Save Playwright browsers
          paths:
            - /root/.cache/ms-playwright
            - ~/.cache/ms-playwright
          key: playwright-v1-{{ arch }}-${PLAYWRIGHT_VERSION}
      - run:
          name: vp run test:browser
          command: pnpm exec vp run test:browser

  # Mirrors .github/workflows/otio-validation.yml. Parses the golden .otio
  # fixtures with the reference opentimelineio package; the app itself never
  # ships or requires Python — this is a CI-only gate.
  otio_validation:
    executor: python
    steps:
      - checkout
      - restore_cache:
          name: Restore pip wheel cache
          keys:
            - pip-otio-v1-{{ checksum "scripts/requirements-otio.txt" }}
            - pip-otio-v1-
      - run:
          name: pip install -r scripts/requirements-otio.txt
          command: pip install --user -r scripts/requirements-otio.txt
      - save_cache:
          name: Save pip wheel cache
          paths:
            - ~/.cache/pip
          key: pip-otio-v1-{{ checksum "scripts/requirements-otio.txt" }}
      - run:
          name: Validate OTIO fixtures
          command: python scripts/validate-otio-fixtures.py

  # Mirrors .github/workflows/whip-integration.yml. MediaMTX runs in Docker
  # with --network host so Playwright's Chromium can reach the WebRTC ICE
  # host candidates without per-port docker mappings.
  whip_integration:
    executor: linux_machine
    steps:
      - checkout
      - run:
          name: Install Node (.node-version)
          # nvm is preinstalled on the ubuntu-2404 machine image; use it to
          # honour .node-version exactly (Node 26). pnpm itself is installed
          # by the `install_pnpm_deps` command below — that path is corepack-
          # free, see the comment there.
          command: |
            export NVM_DIR="$HOME/.nvm"
            # shellcheck source=/dev/null
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            NODE_VERSION="$(cat .node-version)"
            nvm install "$NODE_VERSION"
            nvm alias default "$NODE_VERSION"
            node --version
            # Persist nvm bootstrap into BASH_ENV so later steps see the
            # correct node + npm without re-sourcing nvm.sh.
            echo "export NVM_DIR=$NVM_DIR" >> "$BASH_ENV"
            echo '[ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"' >> "$BASH_ENV"
      - install_pnpm_deps
      - run:
          name: Install Playwright Chromium
          command: pnpm exec playwright install --with-deps chromium
      - run:
          name: Start MediaMTX (host network, API enabled)
          # MTX_API exposes the read-only API the test polls. The reconnect
          # test inside the spec restarts this container by name, which is
          # why MEDIAMTX_CONTAINER is exported to the test environment.
          command: |
            docker run -d --name whip-mediamtx --network host \
              -e MTX_API=yes \
              bluenviron/mediamtx:latest
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:9997/v3/paths/list > /dev/null; then
                exit 0
              fi
              sleep 1
            done
            echo 'MediaMTX API never became ready' >&2
            docker logs whip-mediamtx >&2
            exit 1
      - run:
          name: Run WHIP integration tests
          command: pnpm exec playwright test tests/e2e/whip-publish.spec.ts
          environment:
            MEDIAMTX_CONTAINER: whip-mediamtx
      - run:
          name: MediaMTX logs (on failure)
          command: docker logs whip-mediamtx || true
          when: on_fail
      - store_artifacts:
          path: test-results
          destination: playwright-traces

# --------------------------------- workflows --------------------------------

workflows:
  # Mirrors the trigger surface of the four GH workflows: every push, every
  # PR. CircleCI runs all four jobs in parallel by default; gating them with
  # branch filters would re-introduce the long PR feedback loop the user is
  # trying to escape.
  ci:
    jobs:
      - quality_gate
      - browser_tests
      - otio_validation
      # whip-integration.yml was filtered to `branches: [main]` (push + PRs
      # targeting main). CircleCI has no native PR-target awareness, so we
      # run on every branch and let the WHIP test catch regressions earlier
      # rather than at merge. Add a `filters:` block here if cost becomes a
      # concern — the original behaviour was:
      #   filters:
      #     branches:
      #       only: main
      - whip_integration
