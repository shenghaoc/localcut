version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
      day: 'monday'
      time: '09:00'
      timezone: 'Asia/Singapore'
    open-pull-requests-limit: 10
    labels:
      - 'dependencies'
    commit-message:
      prefix: 'deps'
    groups:
      # vite-plugin-solid major bumps track Vite majors; land together.
      vite-solid-toolchain:
        patterns:
          - 'vite'
          - 'vite-plugin-solid'
        update-types:
          - 'major'
      solid:
        patterns:
          - 'solid-js'
          - 'vite-plugin-solid'
        update-types:
          - 'minor'
          - 'patch'
      vite:
        patterns:
          - 'vite'
          - 'vitest'
          - '@vitest/*'
          - 'vite-plugin-pwa'
        update-types:
          - 'minor'
          - 'patch'
      typescript:
        patterns:
          - 'typescript'
          - 'tslib'
        update-types:
          - 'minor'
          - 'patch'
      types:
        patterns:
          - '@types/*'
          - '@webgpu/types'
        update-types:
          - 'minor'
          - 'patch'
      miscellaneous:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'

  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    open-pull-requests-limit: 2
    labels:
      - 'dependencies'
      - 'github-actions'
    commit-message:
      prefix: 'ci'
    groups:
      actions-minor-and-patch:
        patterns:
          - '*'
        update-types:
          - 'minor'
          - 'patch'
