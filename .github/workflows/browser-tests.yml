name: Browser Tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  browser-tests:
    name: Vitest Browser Mode
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run the job inside Playwright's official prebuilt image — browsers AND
    # all browser system dependencies are baked in at /ms-playwright. This
    # is what bypasses the `playwright install --with-deps chromium` step
    # that was hanging on the GitHub-hosted (Azure) runners' apt mirror.
    # The tag pins to @playwright/test 1.60.0 from package.json so the
    # bundled binaries match the JS package on disk.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # setup-vp is skipped because the container already has Node + npm
      # baked in; running setup-node inside `container:` can fight with the
      # image's own Node. Install pnpm at the locked version directly.
      - name: Install pnpm
        run: |
          PNPM_VERSION=$(node -p "require('./package.json').packageManager.split('@')[1].split('+')[0]")
          echo "Installing pnpm@${PNPM_VERSION}"
          npm install -g "pnpm@${PNPM_VERSION}"
          pnpm config set store-dir /github/home/.pnpm-store
      - name: Cache pnpm store
        uses: actions/cache@v5
        with:
          path: /github/home/.pnpm-store
          key: ${{ runner.os }}-playwright-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-pnpm-
      - name: pnpm install
        run: pnpm install --frozen-lockfile
      - name: Run browser tests
        run: pnpm exec vp run test:browser
