name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test

      # Phase 48: parse the golden .otio fixtures with the reference Python
      # implementation (CI-only — the app never ships or requires Python).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: pip install opentimelineio
      - run: python scripts/validate-otio-fixtures.py
