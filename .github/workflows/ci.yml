name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test

      # Phase 48: parse the golden .otio fixtures with the reference Python
      # implementation (CI-only — the app never ships or requires Python).
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      # Pinned to the release the golden fixtures were verified against;
      # bump deliberately alongside a fixture re-check.
      - run: pip install opentimelineio==0.18.1
      - run: python scripts/validate-otio-fixtures.py
