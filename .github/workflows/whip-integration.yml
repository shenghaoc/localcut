# Phase 47 (T10/R8.3–R8.5): WHIP publish integration test against a real
# MediaMTX ingest. Kept separate from ci.yml so unit CI stays fast and
# container-free.
name: WHIP integration

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  whip-mediamtx:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.1

      - uses: actions/setup-node@v6
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      # Host networking so WebRTC ICE host candidates (UDP) are reachable from
      # the browser without per-port docker mappings; MTX_API exposes the
      # read-only API the assertions poll. The reconnect test restarts this
      # container by name.
      - name: Start MediaMTX
        run: |
          docker run -d --name whip-mediamtx --network host \
            -e MTX_API=yes \
            bluenviron/mediamtx:latest
          for i in $(seq 1 30); do
            curl -fsS http://127.0.0.1:9997/v3/paths/list > /dev/null && exit 0
            sleep 1
          done
          echo 'MediaMTX API never became ready' >&2
          docker logs whip-mediamtx >&2
          exit 1

      - name: Run WHIP integration tests
        run: pnpm run test:e2e
        env:
          MEDIAMTX_CONTAINER: whip-mediamtx

      - name: MediaMTX logs
        if: failure()
        run: docker logs whip-mediamtx

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
